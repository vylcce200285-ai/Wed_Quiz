        `;
        /* ============================================================ */

        let data = []; let currentIndex = 0; let mode = 'flash';

        window.onload = function() {
            const lines = rawData.split('\n').map(l => l.trim()).filter(l => l !== "");
            let tempQuestions = [];
            let currentItem = { q: "", opts: [], a: "" };

            lines.forEach(line => {
                if (/^[A-E]\s?[\.\)]/i.test(line)) {
                    currentItem.opts.push(line);
                } else if (line.length === 1 && /^[A-E]$/i.test(line)) {
                    currentItem.a = line.toUpperCase();
                    let foundFull = currentItem.opts.find(o => o.toUpperCase().startsWith(currentItem.a));
                    currentItem.a_full = foundFull || ("Đáp án: " + currentItem.a);
                    if (currentItem.q && currentItem.opts.length > 0) {
                        tempQuestions.push({...currentItem});
                    }
                    currentItem = { q: "", opts: [], a: "" };
                } else {
                    if (currentItem.opts.length === 0) {
                        currentItem.q += (currentItem.q ? " " : "") + line;
                    }
                }
            });

            data = tempQuestions;
            if (data.length > 0) render();
            else alert("Dữ liệu dán vào chưa đúng định dạng!");
        };

        function setMode(m) {
            mode = m;
            document.getElementById('mode-flash').classList.toggle('active-mode', m === 'flash');
            document.getElementById('mode-quiz').classList.toggle('active-mode', m === 'quiz');
            render();
        }

        function render() {
            const item = data[currentIndex];
            document.getElementById('progress').innerText = `CÂU ${currentIndex + 1} / ${data.length}`;
            
            if (mode === 'flash') {
                document.getElementById('flash-area').style.display = 'block';
                document.getElementById('quiz-area').style.display = 'none';
                document.getElementById('flash-q').innerText = item.q;
                document.getElementById('flash-a').innerText = item.a_full;
                document.getElementById('flash-opts-list').innerHTML = item.opts.map(o => `<div class="opt-item">${o}</div>`).join('');
                document.getElementById('main-card').classList.remove('flipped');
            } else {
                document.getElementById('flash-area').style.display = 'none';
                document.getElementById('quiz-area').style.display = 'block';
                document.getElementById('quiz-q').innerText = item.q;
                const qBox = document.getElementById('quiz-opts-box');
                qBox.innerHTML = '';
                item.opts.forEach(o => {
                    const b = document.createElement('button');
                    b.className = 'quiz-opt-btn';
                    b.innerText = o;
                    b.onclick = () => {
                        if (o.toUpperCase().startsWith(item.a)) b.classList.add('correct');
                        else {
                            b.classList.add('wrong');
                            Array.from(qBox.children).forEach(c => {
                                if (c.innerText.toUpperCase().startsWith(item.a)) c.classList.add('correct');
                            });
                        }
                    };
                    qBox.appendChild(b);
                });
            }
        }

        function flipCard() { if (mode === 'flash') document.getElementById('main-card').classList.toggle('flipped'); }
        function move(step) { currentIndex = (currentIndex + step + data.length) % data.length; render(); }
        function shuffleData() { data.sort(() => Math.random() - 0.5); currentIndex = 0; render(); alert("Đã trộn ngẫu nhiên!"); }
    </script>
