<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizz học tiếng nhật</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4A90E2;
            --primary-hover: #357ABD;
            --secondary: #F5A623;
            --bg: #F0F2F5;
            --card-bg: #FFFFFF;
            --text-dark: #1A1D2E;
            --text-light: #6C7A8F;
            --correct: #27AE60;
            --incorrect: #E74C3C;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .mode-switch { display: flex; gap: 15px; margin-bottom: 30px; }

        button {
            padding: 12px 24px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-mode { background-color: #E2E8F0; color: var(--text-dark); }
        .btn-mode.active {
            background-color: var(--primary); color: white;
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
        }

        /* Flashcard Styles */
        .flashcard-container {
            width: 100%; max-width: 600px; height: 380px;
            perspective: 1200px; margin-bottom: 30px;
        }

        .card {
            width: 100%; height: 100%; position: relative;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d; cursor: pointer;
        }

        .card.flipped { transform: rotateX(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; background-color: var(--card-bg);
            border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; padding: 30px; box-sizing: border-box; text-align: center;
        }

        .card-back { transform: rotateX(180deg); }

        .term { font-size: 48px; font-weight: 700; margin-bottom: 15px; }
        .meaning { font-size: 36px; font-weight: 700; color: var(--primary); }

        .star-btn {
            position: absolute; top: 25px; right: 25px; font-size: 28px;
            color: #DDE2E8; background: none; border: none; cursor: pointer;
            padding: 5px; z-index: 10;
        }

        .star-btn.active { color: var(--secondary); }

        /* Controls */
        .controls {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; max-width: 600px;
        }

        .btn-nav {
            background-color: white; border: 2px solid #E2E8F0; color: var(--text-dark);
            width: 55px; height: 55px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
        }

        .btn-nav:hover {
            border-color: var(--primary); color: var(--primary); background-color: #F7FAFC;
        }

        .progress-bar-container {
            width: 100%; max-width: 600px; height: 10px;
            background-color: #E2E8F0; border-radius: 5px; margin-bottom: 20px; overflow: hidden;
        }

        .progress-bar {
            height: 100%; background-color: var(--primary); width: 0%; transition: width 0.3s ease;
        }

        /* Quiz Styles */
        .quiz-container { width: 100%; max-width: 600px; display: none; }

        .question-box {
            background-color: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12); margin-bottom: 30px; text-align: center; position: relative;
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .option-btn {
            background-color: white; border: 2px solid #E2E8F0; padding: 25px;
            border-radius: 15px; font-size: 20px; text-align: left; transition: all 0.3s;
        }

        .option-btn:hover:not(:disabled) { border-color: var(--primary); background-color: #F7FAFC; }
        .option-btn.correct { background-color: var(--correct); border-color: var(--correct); color: white; }
        .option-btn.incorrect { background-color: var(--incorrect); border-color: var(--incorrect); color: white; }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
            .term { font-size: 36px; }
            .meaning { font-size: 28px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>📚 ỨNg dụng học tập cho sinh viên FPT</h2>
        <p>Phím: ⬅️ ➡️ (Chuyển câu) | Space/Enter (Lật thẻ)</p>
        
        <a href="mkt101.html" style="display: inline-block; margin-top: 10px; padding: 10px 20px; background-color: #E74C3C; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s;">
            <i class="fas fa-desktop"></i> VÀO PHỒNG THI
        </a>
    </div>

    <div class="mode-switch">
        <button class="btn-mode active" id="btn-flashcard" onclick="switchMode('flashcard')"><i class="fas fa-layer-group"></i> Học Thẻ</button>
        <button class="btn-mode" id="btn-quiz" onclick="switchMode('quiz')"><i class="fas fa-list-ul"></i> Trắc Nghiệm</button>
    </div>

    <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div id="flashcard-view" class="flashcard-container">
        <div class="card" id="card" onclick="flipCard()">
            <button class="star-btn" id="star-btn-card" onclick="toggleStar(event)"><i class="fas fa-star"></i></button>
            <div class="card-face card-front">
                <div class="term" id="fc-term"></div>
            </div>
            <div class="card-face card-back">
                <div class="meaning" id="fc-meaning"></div>
            </div>
        </div>
    </div>

    <div id="quiz-view" class="quiz-container">
        <div class="question-box">
            <button class="star-btn" id="star-btn-quiz" onclick="toggleStar(event)"><i class="fas fa-star"></i></button>
            <div style="font-size: 18px; color: var(--text-light); margin-bottom: 15px;">Chọn nghĩa đúng:</div>
            <div class="term" id="quiz-term"></div>
        </div>
        <div class="options-grid" id="quiz-options"></div>
        <div id="quiz-next-container" class="hidden" style="text-align: center; margin-top: 30px;">
            <button onclick="nextItem()" style="background-color: var(--primary); color: white; width: 100%;">Câu Tiếp Theo <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <div class="controls" id="main-controls">
        <button class="btn-nav" onclick="prevItem()" title="Phím mũi tên trái (←)"><i class="fas fa-arrow-left"></i></button>
        <div class="progress"><span id="current-index">1</span> / <span id="total-items">0</span></div>
        <button class="btn-nav" onclick="nextItem()" title="Phím mũi tên phải (→)"><i class="fas fa-arrow-right"></i></button>
    </div>

    <script>
        // ==========================================
        // KHU VỰC DÁN DỮ LIỆU CỦA BẠN (Dán vào giữa 2 dấu ` )
        // ==========================================
        const rawData = `
いま

りゅうがくせい

いちねん
1 năm

あき
Mùa thu


ふゆ
Mùa đông


ゴールデンウイーク
Tuần lễ vàng

いきます
Đi


かえります

たべます
Ăn

thức dậy

        `;
        // ==========================================

        function parseRawData(text) {
            const lines = text.split('\n').map(line => line.trim()).filter(line => line !== '');
            const vocab = [];
            for (let i = 0; i < lines.length; i += 2) {
                if (i + 1 < lines.length) {
                    vocab.push({ term: lines[i], meaning: lines[i + 1] });
                }
            }
            return vocab;
        }

        const vocabulary = parseRawData(rawData);
        let currentIndex = 0;
        let isFlashcardMode = true;
        let starredItems = new Set(); 

        function init() {
            if(vocabulary.length === 0) {
                alert("Lỗi: Không có dữ liệu từ vựng!");
                return;
            }
            document.getElementById('total-items').innerText = vocabulary.length;
            renderCurrentItem();
        }

        function updateProgressBar() {
            const percentage = ((currentIndex + 1) / vocabulary.length) * 100;
            document.getElementById('progress-bar').style.width = percentage + '%';
        }

        function switchMode(mode) {
            isFlashcardMode = (mode === 'flashcard');
            document.getElementById('btn-flashcard').classList.toggle('active', isFlashcardMode);
            document.getElementById('btn-quiz').classList.toggle('active', !isFlashcardMode);
            document.getElementById('flashcard-view').style.display = isFlashcardMode ? 'block' : 'none';
            document.getElementById('quiz-view').style.display = isFlashcardMode ? 'none' : 'block';
            document.getElementById('main-controls').style.display = isFlashcardMode ? 'flex' : 'none';
            document.getElementById('card').classList.remove('flipped');
            renderCurrentItem();
        }

        function renderCurrentItem() {
            const item = vocabulary[currentIndex];
            document.getElementById('current-index').innerText = currentIndex + 1;
            updateProgressBar();

            const isStarred = starredItems.has(currentIndex);
            document.getElementById('star-btn-card').classList.toggle('active', isStarred);
            document.getElementById('star-btn-quiz').classList.toggle('active', isStarred);

            if (isFlashcardMode) {
                document.getElementById('fc-term').innerText = item.term;
                document.getElementById('fc-meaning').innerText = item.meaning;
            } else {
                renderQuiz(item);
            }
        }

        function flipCard() {
            document.getElementById('card').classList.toggle('flipped');
        }

        function toggleStar(event) {
            event.stopPropagation(); 
            if (starredItems.has(currentIndex)) {
                starredItems.delete(currentIndex);
            } else {
                starredItems.add(currentIndex);
            }
            renderCurrentItem(); 
        }

        function nextItem() {
            currentIndex = (currentIndex + 1) % vocabulary.length;
            document.getElementById('card').classList.remove('flipped');
            renderCurrentItem();
        }

        function prevItem() {
            currentIndex = (currentIndex - 1 + vocabulary.length) % vocabulary.length;
            document.getElementById('card').classList.remove('flipped');
            renderCurrentItem();
        }

        function renderQuiz(correctItem) {
            document.getElementById('quiz-term').innerText = correctItem.term;
            document.getElementById('quiz-next-container').classList.add('hidden');
            
            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';

            let options = [correctItem];
            let tempVocab = [...vocabulary].filter((_, index) => index !== currentIndex);
            
            for(let i = 0; i < 3 && tempVocab.length > 0; i++) {
                const randIdx = Math.floor(Math.random() * tempVocab.length);
                options.push(tempVocab[randIdx]);
                tempVocab.splice(randIdx, 1);
            }

            options.sort(() => Math.random() - 0.5);

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.meaning;
                btn.onclick = () => checkAnswer(btn, opt.meaning === correctItem.meaning);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedBtn, isCorrect) {
            const buttons = document.querySelectorAll('.option-btn');
            const correctItem = vocabulary[currentIndex];

            buttons.forEach(btn => {
                btn.disabled = true;
                if (btn.innerText === correctItem.meaning) {
                    btn.classList.add('correct'); 
                }
            });

            if (!isCorrect) {
                selectedBtn.classList.add('incorrect'); 
            }
            document.getElementById('quiz-next-container').classList.remove('hidden');
        }

        // --- LẮNG NGHE SỰ KIỆN PHÍM MŨI TÊN ---
        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowRight') {
                nextItem();
            } else if (event.key === 'ArrowLeft') {
                prevItem();
            } else if (event.key === ' ' || event.key === 'Enter') {
                // Thêm phím Space hoặc Enter để lật thẻ cho tiện
                if (isFlashcardMode) {
                    flipCard();
                    event.preventDefault(); // Ngăn trình duyệt cuộn trang
                }
            }
        });

        init();
    </script>
</body>
</html>
